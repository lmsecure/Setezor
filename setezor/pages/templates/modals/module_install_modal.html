<div id="moduleInstallModal" class="modal fade" tabindex="-1" aria-hidden="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" data-i18n="Module is not installed"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="moduleInstallMessage"></p>
        <div id="moduleInstallStatus" class="d-none text-muted small mt-2" data-i18n="Installing...">
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="moduleInstallCancelBtn" data-i18n="Cancel"></button>
        <button type="button" class="btn btn-success" id="moduleInstallConfirmBtn" data-i18n="Install"></button>
      </div>
    </div>
  </div>
</div>
