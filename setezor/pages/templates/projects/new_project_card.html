{% macro show() %}
<div class="col h-100">

  {# ── Карточка: создать / импортировать проект ── #}
  <div class="card mb-3" style="height: calc(50% - 1rem);">
    <h6 class="card-header"
        style="display: flex; align-items: center; word-break: break-word; overflow-wrap: break-word;">
      <label class="form-check-label me-2" style="flex-grow: 1;"></label>
      <div class="dropdown">
        <i class="bi bi-three-dots" type="button"
           id="dropdownMenuButton"
           data-bs-toggle="dropdown" aria-expanded="false"></i>
      </div>
    </h6>
    <div class="card-body d-flex flex-column align-items-center justify-content-center"
         style="min-height: 0 !important; margin-top: 20px">
      <h5 class="card-title" data-i18n="New Project"></h5>
      <div class="pb-2 w-100">
        <input id="new_project_name"
               name="project_name"
               type="text"
               class="form-control"
               maxlength="64"
               data-i18n-placeholder="Project name"
               required
               onkeydown="preventEnter(event)">
      </div>
      <button class="btn btn-success w-100"
              id="createProjectButton"
              onclick="createProject()"
              data-i18n="Create"></button>
      <button class="btn btn-success w-100"
              id="importProjectButton"
              onclick="importProject()"
              data-i18n="Import"
              style="margin: 5px 0 20px 0"></button>
      <input type="file" id="projectFileInput" style="display: none" accept=".zip">
    </div>
  </div>

  {# ── Карточка: войти по токену ── #}
  <div class="card h-50">
    <h6 class="card-header"
        style="display: flex; align-items: center; word-break: break-word; overflow-wrap: break-word;">
      <label class="form-check-label me-2" style="flex-grow: 1;"></label>
      <div class="dropdown">
        <i class="bi bi-three-dots" type="button"
           id="dropdownMenuButtonToken"
           data-bs-toggle="dropdown" aria-expanded="false"></i>
      </div>
    </h6>
    <div class="card-body d-flex flex-column justify-content-center"
         style="height: 100%; padding-top: 0;">
      <div>
        <h4 class="card-title">
          <div class="d-flex flex-column align-items-center">
            <h5 data-i18n="Enter By Token"></h5>
          </div>
        </h4>
        <div class="pb-2">
          <input id="invite_token_enter"
                 name="invite_token_enter"
                 type="text"
                 class="form-control"
                 maxlength="64"
                 data-i18n-placeholder="Invite Token">
        </div>
        <button class="btn btn-success w-100"
                id="enterByTokenButton"
                onclick="enterByToken()"
                data-i18n="Enter"></button>
      </div>
    </div>
  </div>

</div>
{% endmacro %}
